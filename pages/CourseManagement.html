<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Course Catalog</title>
  <link rel="stylesheet" href="../css/courseManagement.css">
</head>
<body>
  <div class="header">
    <h1>Online Learning Platform - Course Catalog</h1>
  </div>

  <div class="container">
    <div class="filter">
      <select>
        <option value="all">All Categories</option>
        <option value="html">HTML</option>
        <option value="css">CSS</option>
        <option value="js">JS</option>
      </select>
    </div>

    <div class="course-grid">
      <div class="course-card">
        <img src="..//image/logo.png" alt="HTML Course">
        <h3><a href="../course-details.html">HTML for Beginners</a></h3>
        <p>Category: Programming</p>
        <div class="rating">⭐⭐⭐⭐☆</div>
      </div>

      <div class="course-card">
        <img src="assets/course-images/uiux.jpg" alt="UI/UX">
        <h3><a href="course-details.html">UI/UX Fundamentals</a></h3>
        <p>Category: Design</p>
        <div class="rating">⭐⭐⭐⭐⭐</div>
      </div>

      <!-- Add more course cards here -->
    </div>
  </div>
</body>
</html>
