<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Certificate</title>
  <link rel="stylesheet" href="../css/certificate.css">
</head>
<body>
    <header>
        <div class="logo">CodeCraft</div>
        <nav>
            <ul>
                <li><a href="../index.html">Home</a></li>
                <li><a href="../pages/CourseManagement.html">Courses</a></li>
                <li><a href="../pages/forum.html" class="active">Forum</a></li>
                <li><a href="#">Progress</a></li>
                <li><a href="../pages/login.html">Account</a></li>
            </ul>
        </nav>  
    </header>

  <main>
    <section class="certificate-preview">
      <h2>Preview Your Certificate</h2>
      <label for="studentName">Enter Your Name:</label>
      <input type="text" id="studentName" placeholder="Your Name">
      <label for="completionDate">Completion Date:</label>
      <input type="date" id="completionDate">
      <div class="certificate-box">
        <h3>Certificate of Completion</h3>
        <p>This certifies that <span id="nameDisplay">[Your Name]</span></p>
        <p>has successfully completed the course</p>
        <p>on <span id="dateDisplay">[Date]</span></p>
      </div>
      <button onclick="generatePreview()">Preview Certificate</button>
      <button onclick="downloadCertificate()">Download PDF</button>
      <button onclick="shareLink()">Get Shareable Link</button>
    </section>
  </main>

  <footer>
    <p>&copy; 2025 Online Learning Platform</p>
  </footer>

  <script src="../js/certificate.js"></script>
</body>
</html>
