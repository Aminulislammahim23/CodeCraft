<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Certificate Dashboard</title>
  <link rel="stylesheet" href="../css/certificate.css">
</head>
<body>

  <h1>Certificate Management</h1>

  <div class="search-container">
    <input type="text" id="searchInput" placeholder="Search by course name or username...">
    <button onclick="searchCertificate()">Search</button>
  </div>

  <div class="certificate-card" id="certificateDisplay" style="display:none;">
    <div class="certificate-row"><strong>Course ID:</strong> <span id="courseId">---</span></div>
    <div class="certificate-row"><strong>User ID:</strong> <span id="userId">---</span></div>
    <div class="certificate-row"><strong>Certificate ID:</strong> <span id="certificateId">---</span></div>
    <div class="certificate-row"><strong>Date Issued:</strong> <span id="dateIssued">---</span></div>
    <div class="certificate-row"><strong>Download:</strong> <a class="download-btn" id="downloadLink" href="#" target="_blank">Download Certificate</a></div>
  </div>

   <script src="../js/certificate.js"></script>
</body>
</html>
